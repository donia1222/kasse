<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<a id="dl192" download="icon-192.png">Descargar 192x192</a><br>
<a id="dl512" download="icon-512.png">Descargar 512x512</a>
<script>
function draw(size) {
  const c = document.getElementById('c')
  c.width = size; c.height = size
  const ctx = c.getContext('2d')
  const r = size * 0.18

  // Fondo verde redondeado
  ctx.beginPath()
  ctx.moveTo(r, 0)
  ctx.lineTo(size - r, 0)
  ctx.quadraticCurveTo(size, 0, size, r)
  ctx.lineTo(size, size - r)
  ctx.quadraticCurveTo(size, size, size - r, size)
  ctx.lineTo(r, size)
  ctx.quadraticCurveTo(0, size, 0, size - r)
  ctx.lineTo(0, r)
  ctx.quadraticCurveTo(0, 0, r, 0)
  ctx.closePath()
  ctx.fillStyle = '#2C5F2E'
  ctx.fill()

  // Emoji 🧾
  ctx.font = `${size * 0.55}px serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('🧾', size / 2, size / 2 + size * 0.03)

  return c.toDataURL('image/png')
}

draw(192)
document.getElementById('dl192').href = draw(192)

draw(512)
document.getElementById('dl512').href = draw(512)
</script>
</body>
</html>
